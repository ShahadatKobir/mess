<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Master Niloy Mess</title>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --warning: #f6c23e; }
        body { background: #f8f9fc; font-family: 'SolaimanLipi', sans-serif; }
        .navbar { background: linear-gradient(135deg, #4e73df 0%, #224abe 100%); }
        .card { border: none; border-radius: 15px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-round { border-radius: 30px; padding: 10px 25px; }
        .stat-card { border-left: 5px solid var(--primary); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fas fa-utensils me-2"></i> মাস্টার নিলয় মেস</a>
            {% if session['user_id'] %}
            <div class="text-white">
                <span class="me-3">স্বাগতম, {{ session['username'] }}</span>
                <a href="/logout" class="btn btn-sm btn-outline-light">লগআউট</a>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
