{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card p-5 shadow-lg border-0 text-center">
            <div class="mb-4">
                <i class="fas fa-user-circle fa-4x text-primary"></i>
            </div>
            <h2 class="fw-bold text-dark mb-1">মাস্টার নিলয় মেস ম্যানেজমেন্ট</h2>
            <p class="text-muted mb-4">আপনাদের স্বাগতম! লগইন করে শুরু করুন।</p>
            
            <form action="/login" method="POST">
                <div class="form-floating mb-3">
                    <input type="text" name="username" class="form-control" id="u" placeholder="Username" required>
                    <label for="u">ইউজারনেম</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" name="password" class="form-control" id="p" placeholder="Password" required>
                    <label for="p">পাসওয়ার্ড</label>
                </div>
                <button class="btn btn-primary w-100 btn-round fs-5 shadow" type="submit">প্রবেশ করুন</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
